spring.application.name=Ecommerce-SpringBoot

#Config.BBDD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

#Config.hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Config.mail
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}