<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Category</title>
</head>

<body>
    <section>
        <div class="container-fluid p-3 p-md-5 mt-3 mt-md-5">
            <div class="row">
                <!-- Add Category Form -->
                <div class="col-12 col-md-4 mb-4 mb-md-0">
                    <div class="card card-sh">
                        <div class="card-header text-center fs-4">Add Category</div>
                        <th:block th:if="${session.succMsg}">
                            <p class="text-success text-center fw-bold">[[${session.succMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>

                        <th:block th:if="${session.errorMsg}">
                            <p class="text-danger text-center fw-bold">[[${session.errorMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>
                        <div class="card-body">
                            <form action="/admin/saveCategory" method="post" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <label>Enter Category</label>
                                    <input type="text" name="name" class="form-control">
                                </div>

                                <div class="mb-3">
                                    <label>Status</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive"
                                            id="flexRadioDefault1" value="true" checked>
                                        <label class="form-check-label" for="flexRadioDefault1">
                                            Active
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive"
                                            id="flexRadioDefault2" value="false">
                                        <label class="form-check-label" for="flexRadioDefault2">
                                            Inactive
                                        </label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label>Upload Image</label>
                                    <input type="file" name="file" class="form-control">
                                </div>
                                <button class="btn btn-primary w-100 mt-2">Add</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Category Details Table -->
                <div class="col-12 col-md-8">
                    <div class="card card-sh">
                        <div class="card-header text-center fs-4">Category Details</div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th scope="col">Si No</th>
                                            <th scope="col">Category</th>
                                            <th scope="col">Status</th>
                                            <th scope="col">Image</th>
                                            <th scope="col">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="cat,c:${categorys}">
                                            <th scope="row">[[${c.count}]]</th>
                                            <td>[[${cat.name}]]</td>
                                            <td>[[${cat.isActive}]]</td>
                                            <td><img th:src="@{'/img/category_img/'+${cat.imageName}}" width="50px"
                                                    height="50px" alt="Category image"></td>
                                            <td class="text-nowrap">
                                                <a th:href="@{'/admin/loadEditCategory/'+${cat.id}}"
                                                    class="btn btn-primary btn-sm mb-1"><i
                                                        class="fa-solid fa-pen-to-square fa-1x"></i> Edit</a>
                                                <a th:href="@{'/admin/deleteCategory/'+${cat.id}}"
                                                    class="btn btn-danger btn-sm mb-1"><i
                                                        class="fa-solid fa-trash fa-1x"></i> Delete</a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
