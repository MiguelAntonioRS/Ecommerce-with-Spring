<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Edit Category</title>
</head>

<body>
    <section>
        <div class="container-fluid p-3 p-md-5 mt-3 mt-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-8 col-md-5 col-lg-4">
                    <div class="card card-sh">
                        <div class="card-header text-center fs-4">Edit Category</div>
                        <th:block th:if="${session.succMsg}">
                            <p class="text-success text-center fw-bold">[[${session.succMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <p class="text-danger text-center fw-bold">[[${session.errorMsg}]]</p>
                            <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                        </th:block>
                        <div class="card-body">
                            <form action="/admin/updateCategory" method="post" enctype="multipart/form-data">
                                <input type="hidden" name="id" th:value="${category.id}">
                                <div class="mb-3">
                                    <label>Enter Category</label>
                                    <input type="text" name="name" class="form-control" th:value="${category.name}">
                                </div>

                                <div class="mb-3">
                                    <label>Status</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive"
                                            id="flexRadioDefault1" value="true" th:checked="${category.isActive==true}">
                                        <label class="form-check-label" for="flexRadioDefault1">
                                            Active
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive"
                                            id="flexRadioDefault2" value="false"
                                            th:checked="${category.isActive==false}">
                                        <label class="form-check-label" for="flexRadioDefault2">
                                            Inactive
                                        </label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label>Upload Image</label>
                                    <input type="file" name="file" class="form-control">
                                </div>
                                <div class="mb-3">
                                    <img th:src="@{'/img/category_img/'+${category.imageName}}" width="100px"
                                        height="100px" alt="Current category image" class="img-fluid">
                                </div>
                                <button class="btn btn-primary w-100 mt-2">Edit</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
