<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>
</head>

<body>
    <section>
        <div class="container p-3 p-md-5">
            <p class="text-center fs-3 mt-4">Admin Dashboard</p>
            <div class="row g-3 p-2 p-md-5">
                <div class="col-6 col-md-4">
                    <a href="/admin/loadAddProduct" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-primary">
                                <i class="fa-solid fa-square-plus fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">Add Product</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="/admin/category" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-warning">
                                <i class="fa-solid fa-list fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">Add Category</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="/admin/products" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-success">
                                <i class="fa-solid fa-list fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">View Product</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="/admin/orders" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-primary">
                                <i class="fa-solid fa-box-open fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">Orders</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="/admin/users" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-warning">
                                <i class="fa-solid fa-circle-user fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">Users</h4>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="col-6 col-md-4">
                    <a href="#" class="text-decoration-none">
                        <div class="card card-sh">
                            <div class="card-body text-center text-success">
                                <i class="fa-solid fa-user-plus fa-2x fa-md-3x"></i>
                                <h4 class="mt-2">Add Admin</h4>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
