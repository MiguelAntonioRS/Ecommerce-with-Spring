<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>User Guide - Ecom Store</title>
</head>
<body>
<section>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header text-center bg-primary text-white">
                        <h2><i class="fas fa-book-open me-2"></i>How to Use Our Store</h2>
                    </div>
                    <div class="card-body">

                        <div class="mb-4">
                            <h5 class="fw-bold text-primary">1. Register an Account</h5>
                            <p>Click on <strong>Register</strong> in the top-right corner and fill out the form.</p>
                        </div>

                        <div class="mb-4">
                            <h5 class="fw-bold text-primary">2. Log In</h5>
                            <p>After registering, log in with your email and password.</p>
                        </div>



                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
