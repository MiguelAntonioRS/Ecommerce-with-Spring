<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>LogIn</title>
</head>

<body>
    <section>
        <div class="container mt-3 mt-md-5 p-3 p-md-5">
            <div class="row">
                <!-- Image: hidden on mobile via d-none d-md-block -->
                <div class="col-md-6 p-3 p-md-5 d-none d-md-block">
                    <img src="img/ecom.png" alt="Ecommerce illustration" class="img-fluid"
                        style="max-height: 400px; width: 100%; object-fit: contain;">
                </div>
                <div class="col-12 col-md-6 mt-3 p-2 p-md-5">
                    <div class="card shadow p-3 mb-5 bg-body-tertiary rounded">
                        <div class="card-header">
                            <p class="fs-4 text-center">Login</p>
                            <div th:if="${param.error}" class="alert alert-danger text-center">
                                [[${session.SPRING_SECURITY_LAST_EXCEPTION.message}]]
                            </div>

                            <div th:if="${param.logout}" class="alert alert-success text-center">
                                Logout Successfully
                            </div>

                            <!-- Mensaje de exito al registrarse -->
                            <div th:if="${session.succMsg}" class="alert alert-success text-center">
                                [[${session.succMsg}]]
                            </div>
                        </div>
                        <div class="card-body">
                            <form action="/login" method="post">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input class="form-control" name="username" type="email">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div style="position: relative;">
                                        <input class="form-control" name="password" type="password" id="login-pwd">
                                        <button type="button"
                                                onclick="
                                                const input = document.getElementById('login-pwd');
                                                const icon = this.querySelector('i');
                                                input.type = input.type === 'password' ? 'text' : 'password';
                                                icon.classList.toggle('fa-eye');
                                                icon.classList.toggle('fa-eye-slash');
                                                "
                                                                                            style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
                                                background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #6c757d;">

                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>
                        </div>
                        <div class="card-footer">
                            <a href="/forgot-password" class="text-decoration-none">Forgot Password</a><br>
                            Don't have an account?
                            <a href="/register" class="text-decoration-none">Create one</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
