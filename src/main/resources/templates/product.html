<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Product</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <section>
        <!-- Search bar -->
        <div class="container-fluid mt-3 px-3 px-md-5">
            <div class="row">
                <div class="col-12 col-md-8 offset-md-2">
                    <form action="search" method="get">
                        <div class="input-group">
                            <input type="text" class="form-control search-input" name="search"
                                placeholder="Search Products...">
                            <button class="btn search-btn ms-2">
                                <i class="fa-solid fa-magnifying-glass"></i> Search
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="container-fluid mt-4 px-3 px-md-4">
            <div class="row">
                <!-- Category sidebar: becomes horizontal list on mobile -->
                <div class="col-12 col-md-2 mb-3 mb-md-0 p-0">
                    <div class="list-group">
                        <p class="fs-5 d-none d-md-block">Category</p>
                        <div class="d-flex flex-wrap d-md-block">
                            <a href="/products" th:classappend="${paramValue == ''} ? 'active':''"
                                class="list-group-item list-group-item-action" aria-current="true">
                                All
                            </a>
                            <a th:each="c:${categories}" th:href="@{'/products?category='+${c.name}}"
                                th:classappend="${paramValue == c.name} ? 'active':''"
                                class="list-group-item list-group-item-action">[[${c.name}]]</a>
                        </div>
                    </div>
                </div>

                <!-- Products grid -->
                <div class="col-12 col-md-10">
                    <div class="card">
                        <div class="card-body">
                            <p class="fs-3 text-center">Products</p>
                            <div class="row g-2 g-md-3">
                                <th:block th:if="${products.size > 0}">
                                    <div class="col-6 col-sm-4 col-md-3" th:each="p : ${products}">
                                        <div class="card h-100">
                                            <div class="card-body d-flex flex-column p-2 p-md-3">
                                                <div class="product-image-container mb-2 text-center">
                                                    <img th:src="@{/admin/images/product/{name}(name=${p.image})}"
                                                         class="product-card-image"
                                                         alt="[[${p.title}]]"
                                                         onerror="this.src='/img/default-product.png'">
                                                </div>
                                                <h6 class="fw-bold text-center flex-grow-1" style="font-size: 0.85rem;">
                                                    [[${p.title}]]</h6>
                                                <p class="text-muted text-center mb-2" style="font-size: 0.8rem;">
                                                    $[[${p.discountPrice}]]
                                                    <br>
                                                    <span class="text-decoration-line-through">$[[${p.price}]]</span>
                                                    <span class="text-success">[[${p.discount}]]% off</span>
                                                </p>
                                                <a th:href="@{'/product/'+${p.id}}"
                                                    class="btn btn-primary btn-sm mt-auto">View Details</a>
                                            </div>
                                        </div>
                                    </div>
                                </th:block>
                                <th:block th:unless="${products.size > 0}">
                                    <div class="col-12">
                                        <p class="fs-4 text-center mt-4 text-danger">Product not Available</p>
                                    </div>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
