<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>

<body>
<section>
    <div class="container mt-3 mt-md-5 p-3 p-md-5">
        <form action="/user/save-order" method="post">
            <div class="row">
                <!-- Billing Address -->
                <div class="col-12 col-md-6 mb-4 mb-md-0">
                    <p class="text-center fs-4">Billing Address</p>
                    <hr>

                    <div class="row mb-3">
                        <div class="col-12 col-sm-6 p-1">
                            <label>First Name</label>
                            <input type="text" name="firstName" class="form-control mt-1" required>
                        </div>
                        <div class="col-12 col-sm-6 p-1">
                            <label>Last Name</label>
                            <input type="text" name="lastName" class="form-control mt-1" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12 col-sm-6 p-1">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control mt-1" required>
                        </div>
                        <div class="col-12 col-sm-6 p-1">
                            <label>Mobile Number</label>
                            <input type="text" name="mobile" class="form-control mt-1" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12 col-sm-6 p-1">
                            <label>Address</label>
                            <input type="text" name="address" class="form-control mt-1" required>
                        </div>
                        <div class="col-12 col-sm-6 p-1">
                            <label>City</label>
                            <input type="text" name="city" class="form-control mt-1" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-12 col-sm-6 p-1">
                            <label>State</label>
                            <input type="text" name="state" class="form-control mt-1" required>
                        </div>
                        <div class="col-12 col-sm-6 p-1">
                            <label>Pin Code</label>
                            <input type="number" name="pincode" class="form-control mt-1" required>
                        </div>
                    </div>
                </div>

                <!-- Payment Type -->
                <div class="col-12 col-md-6">
                    <p class="text-center fs-4">Payment Type</p>
                    <hr>
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-borderless">
                                <tbody>
                                <tr>
                                    <td>Total Price</td>
                                    <td>:</td>
                                    <td>$ [[${orderPrice}]]</td>
                                </tr>
                                <tr>
                                    <td>Delivery Fee</td>
                                    <td>:</td>
                                    <td>$ 5</td>
                                </tr>
                                <tr>
                                    <td>Tax</td>
                                    <td>:</td>
                                    <td>$ 10</td>
                                </tr>
                                <tr class="border-top">
                                    <td>Total Amount</td>
                                    <td>:</td>
                                    <td>$ [[${totalOrderPrice}]]</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card shadow p-3 mb-5 mt-2 bg-body-tertiary rounded">
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Select Payment Type</label>
                                <select name="paymentType" class="form-control" required>
                                    <option>--select--</option>
                                    <option value="COD">Cash On Delivery</option>
                                    <option value="ONLINE">Online Payment</option>
                                </select>
                            </div>
                            <button class="btn btn-primary w-100">Place Order</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</section>
</body>

</html>
