<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Success</title>
</head>
<body>
<section>
    <div class="container mt-5 p-5">
        <div class="row">
            <div class="col-md-10 offset-md-1">
                <div class="card">
                    <div class="card-body">
                        <p class="fs-3 text-center">My profile</p>
                        <div class="text-center">
                            <!-- Si hay imagen de Cloudinary, úsala; si no, usa la local por defecto -->
                            <img th:src="${user.profileImage != null and user.profileImage != ''}
                                          ? ${user.profileImage}
                                          : @{/img/profile_img/ecom.png}"
                                 alt="Profile image"
                                 class="border p-2"
                                 style="width: 110px; height: 110px; border-radius: 50%;">
                        </div>
                        <table></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
